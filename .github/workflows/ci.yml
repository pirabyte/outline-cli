name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: CLI help smoke test
        shell: bash
        run: |
          set +e
          output=$(node dist/cli.js --help 2>&1)
          status=$?
          echo "$output"
          test $status -eq 2
          echo "$output" | grep -q "Outline CLI"

